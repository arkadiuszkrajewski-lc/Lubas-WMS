<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LUBAS WMS v5.10 (Three-Main-Tabs)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  
  <script type="text/javascript">
    var ZebraBrowserPrint = function() {
      function e(e, t) { var n = new XMLHttpRequest; return "withCredentials" in n ? n.open(e, t, !0) : "undefined" != typeof XDomainRequest ? (n = new XDomainRequest, n.open(e, t)) : n = null, n }
      function t(t, n, o, r) { var i = e(t, n); return i ? (i.onload = function() { if (200 === i.status) o(i.responseText); else { var e = i.responseText; try { e = JSON.parse(i.responseText) } catch (t) {} r(e) } }, i.onerror = function() { r(i.responseText) }, i) : void r("CORS not supported") }
      var n = {}, o = "https://localhost:9101/"; return n.getLocalDevices = function(e, n, o) { var r = t("GET", "https://localhost:9101/available", function(t) { try { var o = JSON.parse(t); e(o) } catch (r) { n(r) } }, n); r && r.send() }, n.getDefaultDevice = function(e, o, r) { var i = t("GET", "https://localhost:9101/default", function(t) { try { var r = JSON.parse(t); o(r) } catch (i) { r(i) } }, r); i && i.send() }, n.sendThroughPrintService = function(e, n, i, s) { var a = t("POST", o + "write", i, s); a && a.send(JSON.stringify({ device: n, data: e })) }, n
    }();
  </script>
  
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
      --accent-blue: #3b82f6;
      --accent-danger: #ef4444;
      --accent-success: #10b981;
      --accent-purple: #a855f7;
      --text-main: #f8fafc;
    }
    body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-user-select: none; user-select: none; }
    .modern-card { background: var(--card-dark); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.25); margin-bottom: 25px; }
    .SkanerOkno { background: #000; border-radius: 16px; overflow: hidden; width: 100%; margin: 0 auto; display: none; aspect-ratio: 4/3; border: 2px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
    .wielki-input { font-size: 1.1rem; padding: 14px; background-color: #0f172a !important; color: #fff !important; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; }
    .wielki-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25); }
    .skan-aktywny { border: 2px solid var(--accent-danger) !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3) !important; }
    .btn-modern { border-radius: 12px; padding: 14px; font-weight: 600; transition: all 0.2s; }
    
    /* Główne menu trzech zakładek */
    .glowny-przelacznik .btn-check:checked + .btn-outline-light { background-color: var(--accent-blue); border-color: var(--accent-blue); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    .glowny-przelacznik .btn { font-size: 0.85rem; letter-spacing: 0.5px; padding: 12px 5px; font-weight: 800; border-color: rgba(255,255,255,0.15); color: #94a3b8; }
    
    /* Mini przełącznik wewnątrz sekcji wydruków */
    .mini-przelacznik .btn-check:checked + .btn { background-color: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: #fff; }
    .mini-przelacznik .btn { font-size: 0.8rem; font-weight: 600; color: #a6b5cc; border-color: transparent; }

    .form-group-custom { margin-bottom: 20px; }
    .label-custom { font-size: 0.9rem; letter-spacing: 0.5px; margin-bottom: 10px; display: block; }
    #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .login-scanner-box { background: #000; border-radius: 12px; overflow: hidden; width: 100%; max-width: 280px; display: none; aspect-ratio: 1/1; margin-bottom: 25px; border: 2px solid var(--accent-blue); }
    
    .naglowek-operatora { display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; width: 100%; padding-bottom: 10px; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="text-center p-4 modern-card" style="max-width: 420px; width: 100%;">
    <h3 class="fw-bold mb-2">LUBAS <span class="text-primary">WMS</span></h3>
    <p class="text-muted small mb-4">Zaloguj się swoimi danymi z bazy</p>
    
    <div id="login-reader" class="login-scanner-box mx-auto"></div>

    <div class="text-start">
      <div class="form-group-custom">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <label class="label-custom text-secondary fw-bold m-0">Email:</label>
          <button id="btn-toggle-login-scan" onclick="odpalSkanerLogowania()" class="btn btn-sm btn-outline-info py-1 px-2" style="font-size:0.75rem;">📷 Skanuj kartę</button>
        </div>
        <input type="email" id="auth-email" class="form-control wielki-input text-lowercase" placeholder="Wpisz lub zeskanuj e-mail">
      </div>
      
      <div class="form-group-custom">
        <label class="label-custom text-secondary fw-bold mb-2">Hasło:</label>
        <div class="input-group">
          <input type="password" id="auth-password" class="form-control wielki-input" placeholder="Wpisz hasło dostępu">
          <button class="btn btn-outline-secondary px-3" type="button" onclick="przelaczWidokHasla()" style="border-top-right-radius: 10px; border-bottom-right-radius: 10px; border-color: rgba(255,255,255,0.1); background: #0f172a; color: #94a3b8;">👁️</button>
        </div>
      </div>
    </div>
    
    <button id="btn-login-submit" onclick="autoryzujZBazą()" class="btn btn-primary w-100 btn-modern fs-5 mt-4">Zaloguj do systemu</button>
  </div>
</div>

<div class="container py-3" style="max-width: 480px;">
  <div class="naglowek-operatora mb-3">
    <h4 class="fw-bold m-0">LUBAS WMS <span class="text-info fw-bold" style="font-size:0.9rem;">v5.10</span></h4>
    <div class="d-flex align-items-center gap-2">
      <span id="user-badge" class="badge bg-success p-2" style="font-size: 0.75rem;">---</span>
      <button onclick="wylogujOperatora()" class="btn btn-sm btn-outline-secondary py-1 px-2" style="font-size: 0.75rem;">Zmień</button>
    </div>
  </div>

  <div class="modern-card p-2 mb-4">
    <div class="btn-group w-100 m-0 glowny-przelacznik" role="group">
      <input type="radio" class="btn-check" name="main-nav" id="tab-wydanie" checked onclick="przelaczGlownyModul('Wydanie')">
      <label class="btn btn-outline-light" for="tab-wydanie">🔴 WYDANIE</label>
      
      <input type="radio" class="btn-check" name="main-nav" id="tab-przyjecie" onclick="przelaczGlownyModul('Przyjęcie')">
      <label class="btn btn-outline-light" for="tab-przyjecie">🟢 PRZYJĘCIE</label>
      
      <input type="radio" class="btn-check" name="main-nav" id="tab-wydruki" onclick="przelaczGlownyModul('Wydruki')">
      <label class="btn btn-outline-light" for="tab-wydruki">🖨️ WYDRUK (QR)</label>
    </div>
  </div>

  <div id="instrukcja-skanu" class="alert alert-warning text-center fw-bold small d-none" style="border-radius:10px;">Skieruj aparat na kod QR...</div>
  <div id="reader" class="SkanerOkno"></div>

  <div id="sekcja-operacji" class="card modern-card p-3 shadow-sm border-0">
    <form id="wmsForm" onsubmit="wyslijDane(event)">
      <input type="hidden" id="operacja" value="Wydanie">
      <input type="hidden" id="aktywne-pole" value="">

      <div class="form-group-custom">
        <label class="form-label fw-bold small text-secondary mb-1">1. KOD TOWARU:</label>
        <div class="input-group">
          <input type="text" id="kod-towaru" class="form-control wielki-input text-uppercase" placeholder="Wymagane dokładnie 5 cyfr (np. 12345)" onclick="aktywujSkanowanie('kod-towaru')" required>
          <button class="btn btn-outline-danger" type="button" onclick="wyczyscPole('kod-towaru')">❌</button>
        </div>
      </div>

      <div class="form-group-custom">
        <label class="form-label fw-bold small text-secondary mb-1">2. ADRES PÓŁKI:</label>
        <div class="input-group">
          <input type="text" id="polka" class="form-control wielki-input text-uppercase" placeholder="Format: 00-00-00-A-00" onclick="aktywujSkanowanie('polka')" required>
          <button class="btn btn-outline-danger" type="button" onclick="wyczyscPole('polka')">❌</button>
        </div>
      </div>

      <div class="form-group-custom" id="sekcja-pracownik">
        <label class="form-label fw-bold small text-secondary mb-1">3. PRACOWNIK (Imię i Nazwisko):</label>
        <div class="input-group">
          <input type="text" id="pracownik" class="form-control wielki-input" placeholder="Wpisz lub skanuj pełne Imię i Nazwisko" onclick="aktywujSkanowanie('pracownik')">
          <button class="btn btn-outline-danger" type="button" onclick="wyczyscPole('pracownik')">❌</button>
        </div>
      </div>

      <div class="form-group-custom">
        <label class="form-label fw-bold small text-secondary mb-1">4. ILOŚĆ SZTUK:</label>
        <input type="number" id="ilosc" class="form-control wielki-input" value="1" min="1" placeholder="Wpisz ilość sztuk" required onfocus="schowajAparat()">
      </div>

      <button type="submit" id="btn-submit" class="btn btn-primary w-100 py-3 fw-bold fs-5 btn-modern mt-1">ZAPISZ OPERACJĘ (Enter)</button>
    </form>
    <div id="status" class="alert alert-success mt-3 d-none text-center fw-bold" style="border-radius:10px;"></div>
  </div>

  <div id="sekcja-druku" class="modern-card p-3" style="display: none; border: 1px solid rgba(59, 130, 246, 0.25);">
    <div class="btn-group w-100 mb-4 mini-przelacznik" role="group">
      <input type="radio" class="btn-check" name="sub-print" id="sub-towar" checked onclick="przelaczPodpanelDruku('towar')">
      <label class="btn btn-outline-secondary py-2 fw-bold" for="sub-towar">📦 Etykieta Towaru</label>
      
      <input type="radio" class="btn-check" name="sub-print" id="sub-lokalizacja" onclick="przelaczPodpanelDruku('lokalizacja')">
      <label class="btn btn-outline-secondary py-2 fw-bold" for="sub-lokalizacja">📍 Adres Półki</label>
      
      <input type="radio" class="btn-check" name="sub-print" id="sub-user" onclick="przelaczPodpanelDruku('user')">
      <label class="btn btn-outline-secondary py-2 fw-bold" for="sub-user">🪪 Pracownik</label>
    </div>

    <div id="sub-panel-towar">
      <div class="mb-2">
        <label class="small text-secondary fw-bold mb-1">KOD TOWARU:</label>
        <input type="text" id="p-towar-kod" class="form-control wielki-input text-uppercase" placeholder="Wpisz kod (5 cyfr)">
      </div>
      <div class="mb-3">
        <label class="small text-secondary fw-bold mb-1">NAZWA TOWARU:</label>
        <input type="text" id="p-towar-nazwa" class="form-control wielki-input" placeholder="np. Podkładka poliuretanowa fi 80">
      </div>
      <button type="button" onclick="drukujEtykieteTowarowa()" class="btn btn-info w-100 py-3 fw-bold btn-modern">Drukuj Etykietę Towaru (QR)</button>
    </div>
    
    <div id="sub-panel-lokalizacja" style="display: none;">
      <div class="mb-3">
        <label class="small text-secondary fw-bold mb-1">ADRES PÓŁKI (Schemat: 01-02-03-A-04):</label>
        <input type="text" id="p-lok-adres" class="form-control wielki-input text-uppercase" placeholder="Wpisz adres (np. 01-02-03-A-04)">
      </div>
      <button type="button" onclick="drukujEtykieteLokalizacyjna()" class="btn btn-purple w-100 py-3 fw-bold btn-modern text-white" style="background-color: var(--accent-purple);">Drukuj Etykietę Adresową (QR)</button>
    </div>
    
    <div id="sub-panel-user" style="display: none;">
      <div class="mb-3">
        <label class="small text-secondary fw-bold mb-1">IMIĘ I NAZWISKO PRACOWNIKA:</label>
        <input type="text" id="p-user-nazwa" class="form-control wielki-input" placeholder="Wpisz Imię i Nazwisko pracownika">
      </div>
      <button type="button" onclick="drukujEtykietePracownika()" class="btn btn-success w-100 py-3 fw-bold btn-modern">Drukuj Identyfikator (QR)</button>
    </div>
  </div>
</div>

<script>
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykKaTjGfb4H-S-AUUIIMr8g62hAE1V0YWYDhssCbAh26Y9r0u96xVySApf01PqO9sZ0Q/exec";
  
  let html5Qrcode = null;
  let loginQrcode = null;
  let blokadaSkanera = false; 
  let zalogowanyUzytkownik = "";

  window.onload = function() {
    const zapamietanyEmail = localStorage.getItem('wms_user_email');
    const zapamietanaNazwa = localStorage.getItem('wms_user_name');
    if (zapamietanyEmail && zapamietanaNazwa) {
      zalogowanyUzytkownik = zapamietanyEmail;
      document.getElementById('user-badge').innerText = zapamietanaNazwa;
      document.getElementById('login-overlay').style.display = 'none';
      setTimeout(() => { aktywujSkanowanie('kod-towaru'); }, 600);
    }
  };

  function przelaczGlownyModul(modul) {
    schowajAparat();
    const sekcjaOperacji = document.getElementById('sekcja-operacji');
    const sekcjaDruku = document.getElementById('sekcja-druku');
    
    if (modul === 'Wydruki') {
      sekcjaOperacji.style.display = 'none';
      sekcjaDruku.style.display = 'block';
    } else {
      sekcjaOperacji.style.display = 'block';
      sekcjaDruku.style.display = 'none';
      ustawTryb(modul);
    }
  }

  function przelaczPodpanelDruku(typ) {
    document.getElementById('sub-panel-towar').style.display = (typ === 'towar') ? 'block' : 'none';
    document.getElementById('sub-panel-lokalizacja').style.display = (typ === 'lokalizacja') ? 'block' : 'none';
    document.getElementById('sub-panel-user').style.display = (typ === 'user') ? 'block' : 'none';
  }

  function wyslijDoZebry(zplKod) {
    if (typeof ZebraBrowserPrint !== 'undefined') {
      ZebraBrowserPrint.getLocalDevices(function(lista) {
        let urzadzenie = null;
        if (lista && lista.printer && lista.printer.length > 0) urzadzenie = lista.printer[0];
        
        if (urzadzenie) {
          ZebraBrowserPrint.sendThroughPrintService(zplKod, urzadzenie, function() {
            console.log("Wydrukowano pomyślnie.");
          }, function(e) { alert("Błąd portu USB: " + JSON.stringify(e)); });
        } else {
          ZebraBrowserPrint.getDefaultDevice("printer", function(domyslne) {
            if(domyslne && domyslne.name) {
              ZebraBrowserPrint.sendThroughPrintService(zplKod, domyslne, function() {}, function(e) { alert(JSON.stringify(e)); });
            } else { alert("Nie wykryto drukarki. Sprawdź kabel USB."); }
          }, function(err) { alert("Błąd autoryzacji."); });
        }
      }, function(err) { alert("Błąd skanowania serwisu: " + JSON.stringify(err)); });
    } else { alert("Błąd: Sterownik nie jest dostępny."); }
  }

 function drukujEtykieteTowarowa() {
    let kod = document.getElementById('p-towar-kod').value.trim().toUpperCase();
    let nazwa = document.getElementById('p-towar-nazwa').value.trim();
    if(!kod) { alert("Wpisz kod towaru!"); return; }
    
    // Zastępujemy wszelkie nietypowe spacji zwykłymi spacjami, aby drukarka wiedziała, gdzie łamać tekst
    let czystaNazwa = nazwa.replace(/\s+/g, ' '); 
    
    // ZPL ze sprawdzonym formatem ^FB (szerokość 240, maksymalnie 2 linie)
    let zpl = "^XA^CI28" +
// 1. LEWA STRONA: Kod QR
"^FO20,60^BQN,2,4^FDQA," + kod + "^FS" + 

// 2. PRAWA STRONA: Kod towaru
"^FO150,50^A0N,18,16^FDKOD TOWARU:^FS" +
"^FO150,75^A0N,28,26^FD" + kod + "^FS" +

// 3. PRAWA STRONA: Nazwa produktu z wymuszonym łamaniem linii
"^FO150,115^A0N,18,16^FDNAZWA:^FS" +
// ^FB240,2,,L -> zarezerwuj szerokość 240, pozwól na 2 linie, wyrównaj do lewej (L)
"^FO150,140^A0N,26,24^FB240,3,,L^FD" + czystaNazwa + "^FS" +
// --- TUTAJ DODAJEMY DUŻĄ LITERĘ L ---
"^FO330,30^A0N,110,90^FDT^FS" + // Bardzo duża litera L na pozycji X=330, Y=60
"^XZ";

    wyslijDoZebry(zpl);
  }
  function drukujEtykieteLokalizacyjna() {
    let adres = document.getElementById('p-lok-adres').value.trim().toUpperCase();
    if(!adres) { alert("Wpisz adres półki!"); return; }

    let czesci = adres.split('-');
    let m = czesci[0] || "--";
    let r = czesci[1] || "--";
    let reg = czesci[2] || "--";
    let p = czesci[3] || "--";
    let poz = czesci[4] || "--";

    // QR po lewej (FO45,65), dane i pozioma linia po prawej (FO210)
    let zpl = "^XA^CI28" +
"^FO20,60^BQN,2,4^FDQA," + adres + "^FS" + // Kod QR przesunięty lekko w lewo
"^FO150,45^A0N,28,26^FD" + adres + "^FS" + // Adres
"^FO150,85^GB160,1,1^FS" + // Linia rozdzielająca (skrócona do 160, by zrobić miejsce na L)
"^FO150,100^A0N,18,16^FDMAG: " + m + " RZAD: " + r + "^FS" +
"^FO150,130^A0N,18,16^FDREGAL: " + reg + " POZ: " + p + "^FS" +
"^FO150,160^A0N,18,16^FDPOZYCJA: " + poz + "^FS" +
// --- TUTAJ DODAJEMY DUŻĄ LITERĘ L ---
"^FO330,120^A0N,110,90^FDL^FS" + // Bardzo duża litera L na pozycji X=330, Y=60
"^XZ";

              
    wyslijDoZebry(zpl);
  }

  function drukujEtykietePracownika() {
    let dane = document.getElementById('p-user-nazwa').value.trim();
    if(!dane) { alert("Wpisz dane pracownika!"); return; }
    
    // Skrócenie imienia i nazwiska w razie potrzeby
    let skroconeDane = dane.length > 16 ? dane.substring(0, 13) + "..." : dane;
    
    // QR po lewej (FO45,65), dane po prawej (FO210)
    let zpl = "^XA^CI28^BY2,3,40" +
            
              "^FO30,30^BQN,2,4^FDQA," + dane + "^FS" + // Wyśrodkowany QR po lewej
              "^FO150,90^A0N,22,20^FDPRACOWNIK:^FS" +
              "^FO150,145^A0N,26,24^FD" + skroconeDane + "^FS" +
             "^FO330,30^A0N,110,90^FDP^FS" + // Bardzo duża litera L na pozycji X=330, Y=60
              "^XZ";
              
    wyslijDoZebry(zpl);
  }
  function przelaczWidokHasla() {
    const passInput = document.getElementById('auth-password');
    passInput.type = passInput.type === "password" ? "text" : "password";
  }

  function odpalSkanerLogowania() {
    const box = document.getElementById('login-reader');
    box.style.display = 'block';
    if (loginQrcode && loginQrcode.isScanning) return;
    
    loginQrcode = new Html5Qrcode("login-reader");
    loginQrcode.start(
      { facingMode: "environment" },
      { fps: 20, qrbox: null }, 
      (decodedText) => {
        document.getElementById('auth-email').value = decodedText.trim().toLowerCase();
        if (loginQrcode) {
          loginQrcode.stop().then(() => {
            box.style.display = 'none';
            document.getElementById('auth-password').focus();
          });
        }
      },
      (err) => {}
    ).catch(err => { alert("Błąd kamery logowania: " + err); });
  }

  function autoryzujZBazą() {
    const email = document.getElementById('auth-email').value.trim().toLowerCase();
    const haslo = document.getElementById('auth-password').value.trim();
    const btn = document.getElementById('btn-login-submit');
    
    if (email.length < 3 || haslo.length === 0) { alert("Wpisz e-mail oraz hasło."); return; }
    
    btn.disabled = true;
    btn.innerText = "Weryfikacja danych...";

    const bodyForm = {
      akcja: "weryfikuj_user",
      email: email,
      haslo: haslo
    };

    fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(bodyForm)
    })
    .then(res => res.text())
    .then(odpowiedz => {
      btn.disabled = false;
      btn.innerText = "Zaloguj do systemu";
      
      if (odpowiedz.startsWith("DOZWOLONY")) {
        const nazwaPracownika = odpowiedz.split('|')[1];
        localStorage.setItem('wms_user_email', email);
        localStorage.setItem('wms_user_name', nazwaPracownika);
        zalogowanyUzytkownik = email;
        
        document.getElementById('user-badge').innerText = nazwaPracownika;
        document.getElementById('login-overlay').style.display = 'none';
        
        if (loginQrcode && loginQrcode.isScanning) loginQrcode.stop();
        setTimeout(() => { aktywujSkanowanie('kod-towaru'); }, 500);
      } else {
        alert("❌ Błąd: Niepoprawny e-mail lub hasło!");
      }
    })
    .catch(err => {
      alert("Błąd połączenia z serwerem weryfikacji.");
      btn.disabled = false;
    });
  }

  function wylogujOperatora() {
    localStorage.removeItem('wms_user_email');
    localStorage.removeItem('wms_user_name');
    zalogowanyUzytkownik = "";
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('auth-email').value = "";
    document.getElementById('auth-password').value = "";
    schowajAparat();
  }

  function wyczyscPole(id) { document.getElementById(id).value = ""; document.getElementById(id).focus(); }

  function aktywujSkanowanie(poleId) {
    document.getElementById('aktywne-pole').value = poleId;
    document.getElementById('kod-towaru').classList.remove('skan-aktywny');
    document.getElementById('polka').classList.remove('skan-aktywny');
    document.getElementById('pracownik').classList.remove('skan-aktywny');
    document.getElementById(poleId).classList.add('skan-aktywny');
    
    document.getElementById('instrukcja-skanu').classList.remove('d-none');
    document.getElementById('reader').style.display = 'block';

    if(poleId === 'kod-towaru') {
      document.getElementById('instrukcja-skanu').innerText = "📷 KROK 1: Zeskanuj kod QR PRODUKTU";
      document.getElementById('instrukcja-skanu').className = "alert alert-warning text-center fw-bold small text-dark";
    } else if(poleId === 'polka') {
      document.getElementById('instrukcja-skanu').innerText = "📍 KROK 2: Zeskanuj kod QR ADRESU PÓŁKI";
      document.getElementById('instrukcja-skanu').className = "alert alert-info text-center fw-bold small text-dark";
    } else {
      document.getElementById('instrukcja-skanu').innerText = "🪪 KROK 3: Zeskanuj kod QR PRACOWNIKA";
      document.getElementById('instrukcja-skanu').className = "alert alert-danger text-center fw-bold small text-white bg-danger";
    }

    if (html5Qrcode && html5Qrcode.isScanning) return;
    html5Qrcode = new Html5Qrcode("reader");
    html5Qrcode.start(
      { facingMode: "environment" },
      { fps: 25, qrbox: null }, 
      (decodedText) => {
        if (blokadaSkanera) return;
        blokadaSkanera = true;
        let celInput = document.getElementById('aktywne-pole').value;
        document.getElementById(celInput).value = decodedText;
        document.getElementById(celInput).classList.remove('skan-aktywny');
        
        wstrzymajAparat().then(() => {
          setTimeout(() => { blokadaSkanera = false; }, 1500); 
          let trybOperacji = document.getElementById('operacja').value;
          
          if (celInput === 'kod-towaru') {
            aktywujSkanowanie('polka');
          } else if (celInput === 'polka' && trybOperacji === 'Wydanie') {
            aktywujSkanowanie('pracownik');
          } else {
            schowajAparat();
            document.getElementById('ilosc').focus();
            document.getElementById('ilosc').select();
          }
        });
      },
      (errorMessage) => { }
    ).catch(err => { console.log("Błąd kamery:", err); });
  }

  function wstrzymajAparat() { if (html5Qrcode && html5Qrcode.isScanning) return html5Qrcode.stop(); return Promise.resolve(); }
  function schowajAparat() { wstrzymajAparat().then(() => { document.getElementById('reader').style.display = 'none'; document.getElementById('instrukcja-skanu').classList.add('d-none'); document.getElementById('kod-towaru').classList.remove('skan-aktywny'); document.getElementById('polka').classList.remove('skan-aktywny'); document.getElementById('pracownik').classList.remove('skan-aktywny'); }); }

  function ustawTryb(tryb) {
    document.getElementById('operacja').value = tryb;
    const sekcjaPracownik = document.getElementById('sekcja-pracownik');
    if(tryb === 'Przyjęcie') {
      sekcjaPracownik.style.display = 'none';
      document.getElementById('pracownik').removeAttribute('required');
    } else {
      sekcjaPracownik.style.display = 'block';
      document.getElementById('pracownik').setAttribute('required', 'true');
    }
    setTimeout(() => { aktywujSkanowanie('kod-towaru'); }, 100);
  }

  function wyslijDane(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const statusBox = document.getElementById('status');
    btn.disabled = true;
    btn.innerText = "Zapisywanie w chmurze...";

    let tryb = document.getElementById('operacja').value;
    let polkaValue = document.getElementById('polka').value.trim();

    let zLok = (tryb === "Wydanie") ? polkaValue : "DOSTAWCA";
    let doLok = (tryb === "Przyjęcie") ? polkaValue : "PRODUKCJA";

    const paczkaDanych = {
      akcja: "zapis_ruchu",
      typ: tryb,
      Z_Lokalizacji: zLok,
      Do_Lokalizacji: doLok,
      towar: document.getElementById('kod-towaru').value.trim(),
      pracownik: document.getElementById('pracownik').value.trim(),
      ilosc: document.getElementById('ilosc').value,
      operator: zalogowanyUzytkownik
    };

    fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams(paczkaDanych).toString()
    })
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      btn.innerText = "ZAPISZ OPERACJĘ (Enter)";
      
      if(data.status === "SUCCESS") {
        statusBox.innerText = "🚀 ZAPISANO: " + data.id_ruchu;
        statusBox.className = "alert alert-success mt-3 text-center fw-bold bg-success text-white border-0";
        statusBox.classList.remove('d-none');
        
        document.getElementById('kod-towaru').value = "";
        document.getElementById('polka').value = "";
        document.getElementById('pracownik').value = "";
        document.getElementById('ilosc').value = '1';
        
        setTimeout(() => { 
          statusBox.classList.add('d-none'); 
          wstrzymajAparat().then(() => { aktywujSkanowanie('kod-towaru'); }); 
        }, 1500);
      } else {
        alert("Błąd walidacji lub chmury:\n" + data.message);
      }
    })
    .catch(err => { 
      alert("Błąd połączenia z bazą danych."); 
      btn.disabled = false; 
      btn.innerText = "ZAPISZ OPERACJĘ (Enter)";
    });
  }
</script>
