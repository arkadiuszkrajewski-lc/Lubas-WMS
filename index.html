<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS Lubas - Terminal Mobilny</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .scanner-container video { object-fit: cover !important; border-radius: 0.75rem; }
    </style>
</head>
<body class="font-sans text-gray-800">

    <div id="ekranLogowania" class="min-h-screen flex flex-col justify-center items-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-black text-gray-900 tracking-tight">WMS LUBAS</h1>
                <p class="text-sm text-gray-500 mt-1">Zaloguj się kontem lub kartą QR</p>
            </div>
            
            <div id="loginScanner" class="hidden mb-4 overflow-hidden rounded-xl border-2 border-dashed border-gray-300">
                <div id="login-reader" class="w-full"></div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Email</label>
                    <input type="email" id="loginEmail" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Hasło PIN</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                </div>
                <button onclick="autoryzujManualnie()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-blue-700 transition active:scale-95">
                    Zaloguj się
                </button>
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-gray-400 text-xs font-bold uppercase">LUB</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>
                <button onclick="przelaczSkanerLogowania()" id="btnKartaLogowania" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl shadow-md hover:bg-black transition active:scale-95">
                    📷 Zeskanuj kartę pracownika
                </button>
            </div>
        </div>
    </div>

    <div id="panelWMS" class="hidden min-h-screen flex flex-col pb-6">
        <header class="bg-white border-b border-gray-100 px-4 py-3.5 flex justify-between items-center shadow-sm">
            <div>
                <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider">Zalogowany jako:</span>
                <span id="txtNazwaOperatora" class="font-extrabold text-gray-900 text-base">---</span>
            </div>
            <button onclick="wyloguj()" class="text-xs bg-red-50 text-red-600 font-bold px-3 py-2 rounded-xl hover:bg-red-100 transition">
                Wyloguj
            </button>
        </header>

        <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <button id="btnTypWydanie" onclick="ustawTypOperacji('Wydanie')" class="py-4 rounded-2xl font-black text-lg shadow-md transition active:scale-95 bg-red-500 text-white border-2 border-red-500">
                    🔴 WYDANIE
                </button>
                <button id="btnTypPrzyjecie" onclick="ustawTypOperacji('Przyjęcie')" class="py-4 rounded-2xl font-black text-lg shadow-md transition active:scale-95 bg-white text-gray-700 border-2 border-gray-200">
                    🟢 PRZYJĘCIE
                </button>
            </div>

            <div class="bg-white p-3 rounded-2xl shadow-md border border-gray-100 relative">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xs font-bold uppercase tracking-wider text-gray-400">Podgląd Kamery Skonfigurowany na Kwadrat</h2>
                    <span id="stanKamery" class="text-xs text-green-500 font-bold">● Gotowa</span>
                </div>
                <div class="scanner-container bg-black rounded-xl overflow-hidden aspect-square">
                    <div id="wms-reader" class="w-full h-full"></div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-md border border-gray-100 space-y-3.5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Z Lokalizacji</label>
                    <input type="text" id="inpZ_Lokalizacji" class="w-full bg-gray-50 px-4 py-3 rounded-xl border border-gray-200 font-mono text-lg uppercase font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Do Lokalizacji</label>
                    <input type="text" id="inpDo_Lokalizacji" class="w-full bg-gray-50 px-4 py-3 rounded-xl border border-gray-200 font-mono text-lg uppercase font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Skonwertowany Kod Towaru</label>
                    <input type="text" id="inpTowar" class="w-full bg-gray-100 px-4 py-3 rounded-xl border border-gray-200 text-xl font-black text-blue-700 tracking-wide uppercase focus:outline-none" readonly>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Ilość (szt)</label>
                        <input type="number" id="inpIlosc" value="1" min="1" class="w-full bg-gray-50 px-4 py-3 rounded-xl border border-gray-200 text-xl font-bold text-center focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1">Pracownik / Pobierający</label>
                        <input type="text" id="inpPracownik" placeholder="MAGAZYN" class="w-full bg-gray-50 px-4 py-3 rounded-xl border border-gray-200 text-base font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <button onclick="wyslijPaczkeDoWMS()" id="btnZapiszOperacje" class="w-full bg-gray-900 text-white font-black text-xl py-4 rounded-2xl shadow-xl hover:bg-black transition active:scale-95">
                💾 ZAPISZ OPERACJĘ
            </button>
        </main>
    </div>

    <script>
        // !!! ADRES URUCHOMIONEGO WDROŻENIA GOOGLE APPS SCRIPT !!!
        const APPS_SCRIPT_URL = "TUTAJ_WKLEJ_SWÓJ_URL_Z_APPS_SCRIPT";

        let aktualnyOperator = "";
        let wybranyTypOperacji = "Wydanie"; // Domyślnie czerwone Wydanie
        let html5Qrcode = null;
        let loginQrcode = null;

        // Inteligentna funkcja wymuszająca IDEALNY KWADRAT ramki na smartfonach
        const wyliczRozmiarRamkiKwadratowej = (viewfinderWidth, viewfinderHeight) => {
            let mniejszaKrawedz = Math.min(viewfinderWidth, viewfinderHeight);
            let rozmiarBoxa = Math.floor(mniejszaKrawedz * 0.75); // Ramka zajmie 75% szerokości ekranu
            if(rozmiarBoxa < 180) rozmiarBoxa = 180;
            if(rozmiarBoxa > 320) rozmiarBoxa = 320;
            return { width: rozmiarBoxa, height: rozmiarBoxa }; // Równe wartości dają wysoki kwadrat na telefonie!
        };

        function ustawTypOperacji(typ) {
            wybranyTypOperacji = typ;
            const btnW = document.getElementById('btnTypWydanie');
            const btnP = document.getElementById('btnTypPrzyjecie');
            
            if(typ === "Wydanie") {
                btnW.className = "py-4 rounded-2xl font-black text-lg shadow-md transition active:scale-95 bg-red-500 text-white border-2 border-red-500";
                btnP.className = "py-4 rounded-2xl font-black text-lg shadow-md transition active:scale-95 bg-white text-gray-700 border-2 border-gray-200";
            } else {
                btnW.className = "py-4 rounded-2xl font-black text-lg shadow-md transition active:scale-95 bg-white text-gray-700 border-2 border-gray-200";
                btnP.className = "py-4 rounded-2xl font-black text-lg shadow-md transition active:scale-95 bg-green-500 text-white border-2 border-green-500";
            }
        }

        function autoryzujManualnie() {
            let email = document.getElementById('loginEmail').value;
            let pin = document.getElementById('loginPassword').value;
            if(!email || !pin) { alert("Wpisz dane logowania!"); return; }
            procesWeryfikacjiWAppScript(email, pin);
        }

        function przelaczSkanerLogowania() {
            let container = document.getElementById('loginScanner');
            if(container.classList.contains('hidden')) {
                container.classList.remove('hidden');
                loginQrcode = new Html5Qrcode("login-reader");
                loginQrcode.start(
                    { facingMode: "environment" },
                    { fps: 20, qrbox: wyliczRozmiarRamkiKwadratowej },
                    (text) => {
                        try {
                            let daneKarty = JSON.parse(text);
                            if(daneKarty.email && daneKarty.haslo) {
                                loginQrcode.stop().then(() => { container.classList.add('hidden'); });
                                procesWeryfikacjiWAppScript(daneKarty.email, daneKarty.haslo);
                            }
                        } catch(e) {
                            // Jeśli zeskanowano czysty tekst karty zamiast JSON-a
                            if(text.includes("@")) {
                                loginQrcode.stop().then(() => { container.classList.add('hidden'); });
                                alert("Karta odczytana. Weryfikacja bazy danych...");
                            }
                        }
                    }
                ).catch(err => alert("Błąd kamery: " + err));
            } else {
                if(loginQrcode) { loginQrcode.stop().then(() => { container.classList.add('hidden'); }); }
            }
        }

        function procesWeryfikacjiWAppScript(mail, pass) {
            let url = `${APPS_SCRIPT_URL}?akcja=weryfikuj_user&email=${encodeURIComponent(mail)}&haslo=${encodeURIComponent(pass)}`;
            fetch(url, { method: 'POST' })
            .then(r => r.text())
            .then(odpowiedz => {
                if(odpowiedz.startsWith("DOZWOLONY")) {
                    aktualnyOperator = odpowiedz.split("|")[1];
                    document.getElementById('txtNazwaOperatora').innerText = aktualnyOperator;
                    document.getElementById('ekranLogowania').classList.add('hidden');
                    document.getElementById('panelWMS').classList.remove('hidden');
                    uruchomGlowySkanerMagazynowy();
                } else {
                    alert("Odmowa dostępu! Błędny login lub hasło PIN.");
                }
            }).catch(e => alert("Błąd serwera logowania: " + e));
        }

        function uruchomGlowySkanerMagazynowy() {
            html5Qrcode = new Html5Qrcode("wms-reader");
            html5Qrcode.start(
                { facingMode: "environment" },
                { fps: 25, qrbox: wyliczRozmiarRamkiKwadratowej },
                (kodSkanu) => { parseIdentyfikatorSkanu(kodSkanu); }
            ).catch(err => document.getElementById('stanKamery').innerText = "Błąd: Brak aparatu");
        }

        function parseIdentyfikatorSkanu(tekst) {
            tekst = tekst.trim();
            // 1. Wykrywanie lokalizacji magazynowych (Rozpoczynają się od prefiksu LOK-)
            if(tekst.toUpperCase().startsWith("LOK-")) {
                let czystaLok = tekst.toUpperCase();
                if(!document.getElementById('inpZ_Lokalizacji').value) {
                    document.getElementById('inpZ_Lokalizacji').value = czystaLok;
                } else {
                    document.getElementById('inpDo_Lokalizacji').value = czystaLok;
                }
                vibrateDevice(80);
                return;
            }
            // 2. Wykrywanie identyfikatorów pracowników (Rozpoczynają się od prefiksu BHP- lub PRAC-)
            if(tekst.toUpperCase().startsWith("BHP-") || tekst.toUpperCase().startsWith("PRAC-")) {
                document.getElementById('inpPracownik').value = tekst;
                vibrateDevice(80);
                return;
            }
            // 3. W każdym innym wypadku skan traktowany jest jako kod kreskowy / QR towaru
            document.getElementById('inpTowar').value = tekst.toUpperCase();
            vibrateDevice(150);
        }

        function wyslijPaczkeDoWMS() {
            let towar = document.getElementById('inpTowar').value;
            let ilosc = document.getElementById('inpIlosc').value;
            let zLok = document.getElementById('inpZ_Lokalizacji').value;
            let doLok = document.getElementById('inpDo_Lokalizacji').value;
            let pracownik = document.getElementById('inpPracownik').value;

            if(!towar || !ilosc) { alert("Musisz zeskanować towar i podać ilość!"); return; }

            document.getElementById('btnZapiszOperacje').disabled = true;
            document.getElementById('btnZapiszOperacje').innerText = "WYSYŁANIE DO BIGQUERY...";

            let url = `${APPS_SCRIPT_URL}?akcja=zapis_ruchu`
                + `&operator=${encodeURIComponent(aktualnyOperator)}`
                + `&typ=${encodeURIComponent(wybranyTypOperacji)}`
                + `&towar=${encodeURIComponent(towar)}`
                + `&ilosc=${encodeURIComponent(ilosc)}`
                + `&Z_Lokalizacji=${encodeURIComponent(zLok)}`
                + `&Do_Lokalizacji=${encodeURIComponent(doLok)}`
                + `&pracownik=${encodeURIComponent(pracownik)}`;

            fetch(url, { method: 'POST' })
            .then(r => r.text())
            .then(res => {
                if(res.trim() === "Sukces") {
                    alert("Ruch zapisany pomyślnie w BigQuery i odświeżony w arkuszu!");
                    // Czyszczenie formularza pod kolejny ruch
                    document.getElementById('inpTowar').value = "";
                    document.getElementById('inpIlosc').value = "1";
                    document.getElementById('inpZ_Lokalizacji').value = "";
                    document.getElementById('inpDo_Lokalizacji').value = "";
                    document.getElementById('inpPracownik').value = "";
                } else {
                    alert("Błąd zapisu: " + res);
                }
            })
            .catch(e => alert("Błąd połączenia z bazą chmurową: " + e))
            .finally(() => {
                document.getElementById('btnZapiszOperacje').disabled = false;
                document.getElementById('btnZapiszOperacje').innerText = "💾 ZAPISZ OPERACJĘ";
            });
        }

        function vibrateDevice(ms) {
            if (navigator.vibrate) { navigator.vibrate(ms); }
        }

        function wyloguj() {
            if(html5Qrcode) { html5Qrcode.stop().then(() => { location.reload(); }); } else { location.reload(); }
        }
    </script>
</body>
</html>
